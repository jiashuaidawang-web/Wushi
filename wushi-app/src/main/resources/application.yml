server:
  port: ${SERVER_PORT:8080} # 支持动态修改容器端口，默认 8080

spring:
  application:
    name: wushi
  datasource:
    mysql:
      # 用 ${变量名:默认值} 的形式，默认连你的公网IP，但允许通过Docker环境变量动态覆盖为Tailscale内网IP
      jdbc-url: jdbc:mysql://${DB_HOST:100.97.74.45}:${DB_PORT:3306}/wushi?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      username: ${DB_USER:root}
      password: ${DB_PASSWORD:astock_root} # 冒号后面是你当前的默认密码
      driver-class-name: com.mysql.cj.jdbc.Driver
    clickhouse:
      # [ClickHouse fix] 显式声明 database，避免库名没出现在 USE 上下文；与 MarketFactRepositoryImpl 去掉 wushi. 前缀配套
      jdbc-url: jdbc:clickhouse://${CK_HOST:100.97.74.45}:${CK_PORT:8123}/wushi
      username: ${CK_USER:default}
      password: ${CK_PASSWORD:pamirs@123}
      driver-class-name: com.clickhouse.jdbc.ClickHouseDriver

management:
  endpoints:
    web:
      exposure:
        include: health,info

wushi:
  engine:
    default-rule-version: v0.1.0
  selenium:
    # 既然是无状态，跨机器运行时 Selenium 的地址也建议改为支持动态配置
    remote-url: http://${SELENIUM_HOST:localhost}:4444/wd/hub
  spider:
    ths:
      browser:
        proxy-pool: []
        max-proxy-retries: 3
        direct-first: true
        kuaidaili:
          enabled: false
          api-url: "https://dps.kdlapi.com/api/getdps/?secret_id=omb7vq7v5keahv63y6rx&signature=b5nc6bmmjzcmlfvs9h36enz8k1twt8m0&num=1&format=text&sep=1"
          num: 1
          format: text
          timeout-ms: 5000
          max-uses-per-ip: 1
    eastmoney:
      proxy-pool: []
      max-proxy-retries: 3
      direct-first: true
      kuaidaili:
        enabled: false
        api-url: "https://dps.kdlapi.com/api/getdps/?secret_id=omb7vq7v5keahv63y6rx&signature=b5nc6bmmjzcmlfvs9h36enz8k1twt8m0&num=1&format=text&sep=1"
        num: 1
        format: text
        timeout-ms: 5000
        max-uses-per-ip: 1
