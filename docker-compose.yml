version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wushi-backend
    environment:
      SPRING_DATASOURCE_MYSQL_JDBC_URL: "jdbc:mysql://astock-mysql:3306/wushi?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai"
      SPRING_DATASOURCE_MYSQL_USERNAME: root
      SPRING_DATASOURCE_MYSQL_PASSWORD: astock_root
      SPRING_DATASOURCE_CLICKHOUSE_JDBC_URL: "jdbc:clickhouse://astock-clickhouse:8123/wushi"
      SPRING_DATASOURCE_CLICKHOUSE_USERNAME: default
      SPRING_DATASOURCE_CLICKHOUSE_PASSWORD: pamirs@123
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    networks:
      - astock-emotion-system_default
    restart: unless-stopped
    shm_size: 2gb
    deploy:
      resources:
        limits:
          memory: 3G

networks:
  astock-emotion-system_default:
    external: true
